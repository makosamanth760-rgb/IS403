<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • WPU SMS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="appbar">
        <div class="container row space-between">
            <div class="brand">Western Pacific University • Student Management System</div>
            <div><span class="badge">Role-based Access</span></div>
        </div>
    </header>
    <main class="container" style="max-width:720px">
        <div class="card">
            <h2 style="margin-top:0">Login</h2>
            <p class="muted">Enter your email and password.</p>
            <div class="grid" style="grid-template-columns:1fr">
                <label>Email<br>
                    <input id="email" class="input" placeholder="you@example.com" autocomplete="email">
                </label>
                <label>Password<br>
                    <input id="password" type="password" class="input" placeholder="Enter password" autocomplete="current-password">
                </label>
                <button id="loginBtn" class="btn">Login</button>
                <div id="error" class="badge" style="background:#4a2545;display:none">Invalid credentials</div>
            </div>
        </div>
        <footer>© WPU SMS (Demo)</footer>
    </main>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        // Ensure API base is set to local server by default
        (function(){
            if(!localStorage.getItem('wpu_sms_api_base')){
                localStorage.setItem('wpu_sms_api_base','http://localhost:3001');
            }
        })();
        document.getElementById('loginBtn').addEventListener('click', function(){
            const u = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value;
            SMSApp.login(u,p).then(s=>{
                if(!s){
                    const e = document.getElementById('error');
                    e.style.display='inline-block';
                    return;
                }
                SMSApp.navigateToRoleHome();
            }).catch(()=>{
                const e = document.getElementById('error'); e.style.display='inline-block';
            });
        });
    </script>
    
</body>
</html>
