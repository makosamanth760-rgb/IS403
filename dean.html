<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean • WPU SMS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="appbar">
        <div class="container row space-between">
            <div class="brand">Student Services (Dean) Dashboard</div>
            <div class="row" id="userbar"></div>
        </div>
    </header>
    <main class="container grid" style="grid-template-columns: 1fr 2fr;align-items:start">
        <aside class="card">
            <div class="section-title">Actions</div>
            <div class="grid">
                <button class="btn secondary" onclick="showSection('secAllocate')">Allocate Dormitory</button>
                <button class="btn secondary" onclick="showSection('secList')">View Dormitory List</button>
                <button class="btn danger" onclick="SMSApp.logout()">Logout</button>
            </div>
        </aside>
        <section class="card">
            <div id="secAllocate">
                <div class="section-title">Allocate Dormitory</div>
                <div class="grid">
                    <label>Student<br>
                        <select id="studentSelect" class="input"></select>
                    </label>
                    <label>Dormitory<br>
                        <select id="dormSelect" class="input"></select>
                    </label>
                    <button class="btn" onclick="allocate()">Allocate</button>
                    <div id="allocMsg" class="badge" style="display:none">Allocation saved</div>
                </div>
            </div>
            <div id="secList" class="hidden">
                <div class="section-title">Dormitory Allocations</div>
                <table>
                    <thead><tr><th>Dormitory</th><th>Student</th></tr></thead>
                    <tbody id="allocBody"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
    <script>
        const session = SMSApp.guardRole('dean');
        document.getElementById('userbar').innerHTML = `<span class=badge>Logged in: ${session.name}</span>`;
        function showSection(id){
            ['secAllocate','secList'].forEach(x=>document.getElementById(x).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id==='secAllocate'){ renderSelectors(); }
            if(id==='secList'){ renderAllocations(); }
        }
        function renderSelectors(){
            Promise.all([
              SMSApp.apiFetch('/api/registrar/students').then(r=>r.json()),
              SMSApp.apiFetch('/api/dean/dorms').then(r=>r.json())
            ]).then(([students, dorms])=>{
              document.getElementById('studentSelect').innerHTML = students.map(s=>`<option value="${s.id}">${s.givenName} ${s.familyName} (${s.id})</option>`).join('');
              document.getElementById('dormSelect').innerHTML = dorms.map(d=>`<option value="${d.id}">${d.name} (cap ${d.capacity})</option>`).join('');
            });
        }
        function renderAllocations(){
            SMSApp.apiFetch('/api/dean/allocations')
              .then(r=>r.json())
              .then(allocs=>{
                const rows = allocs.map(a=>`<tr><td>${a.dormName||a.dormId}</td><td>${a.givenName} ${a.familyName} (${a.studentId})</td></tr>`).join('');
                document.getElementById('allocBody').innerHTML = rows || '<tr><td colspan=2>None</td></tr>';
              });
        }
        function allocate(){
            const st = document.getElementById('studentSelect').value;
            const dr = document.getElementById('dormSelect').value;
            SMSApp.apiFetch('/api/dean/allocate', { method:'POST', body: JSON.stringify({ studentId: st, dormId: dr }) })
              .then(r=>{ const m = document.getElementById('allocMsg'); if(r.ok){ m.textContent='Allocation saved'; m.style.background=''; } else { m.textContent='Dormitory full or invalid'; m.style.background='#4a2545'; } m.style.display='inline-block'; setTimeout(()=>m.style.display='none',1500); renderAllocations(); });
        }
        showSection('secAllocate');
    </script>
</body>
</html>
