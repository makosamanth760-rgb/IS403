<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar • WPU SMS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="appbar">
        <div class="container row space-between">
            <div class="brand">Registrar Dashboard</div>
            <div class="row" id="userbar"></div>
        </div>
    </header>
    <main class="container grid" style="grid-template-columns: 1fr 2fr;align-items:start">
        <aside class="card">
            <div class="section-title">Actions</div>
            <div class="grid">
                <button class="btn secondary" onclick="showSection('secAddStudent')">Add New Student</button>
                <button class="btn secondary" onclick="showSection('secHECAS')">View HECAS Eligibility</button>
                <button class="btn danger" onclick="SMSApp.logout()">Logout</button>
            </div>
        </aside>
        <section class="card">
            <div id="secAddStudent">
                <div class="section-title">Add New Student</div>
                <div class="grid">
                    <label>Student ID<br><input id="stId" class="input" placeholder="e.g. s1003"></label>
                    <label>Given Name<br><input id="stGiven" class="input"></label>
                    <label>Family Name<br><input id="stFamily" class="input"></label>
                    <label>Email<br><input id="stEmail" class="input" placeholder="student@wpu.ac.pg"></label>
                    <label>Temp Password<br><input id="stPass" class="input" placeholder="Temp password"></label>
                    <label>Program<br><input id="stProgram" class="input"></label>
                    <label>HECAS Eligible?<br>
                        <select id="stHECAS" class="input"><option value="true">Yes</option><option value="false">No</option></select>
                    </label>
                    <button class="btn" onclick="addStudent()">Add Student</button>
                    <div id="addMsg" class="badge" style="display:none">Student added</div>
                </div>
            </div>

            <div id="secHECAS" class="hidden">
                <div class="section-title">HECAS Eligibility</div>
                <table>
                    <thead><tr><th>Student</th><th>Program</th><th>Eligible</th></tr></thead>
                    <tbody id="hecasBody"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
    <script>
        const session = SMSApp.guardRole('registrar');
        document.getElementById('userbar').innerHTML = `<span class="badge">Logged in: ${session.name}</span>`;
        function showSection(id){
            document.getElementById('secAddStudent').classList.add('hidden');
            document.getElementById('secHECAS').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id==='secHECAS') renderHECAS();
        }
        function addStudent(){
            const student = {
                id: document.getElementById('stId').value.trim(),
                givenName: document.getElementById('stGiven').value.trim(),
                familyName: document.getElementById('stFamily').value.trim(),
                email: document.getElementById('stEmail').value.trim(),
                password: document.getElementById('stPass').value,
                program: document.getElementById('stProgram').value.trim(),
                hecasEligible: document.getElementById('stHECAS').value === 'true'
            };
            if(!student.id || !student.givenName || !student.familyName || !student.email || !student.password){ return; }
            SMSApp.apiFetch('/api/registrar/students', { method:'POST', body: JSON.stringify(student) })
                .then(r=>{ if(!r.ok) throw new Error(); return r.json(); })
                .then(()=>{ const m = document.getElementById('addMsg'); m.style.display='inline-block'; setTimeout(()=>m.style.display='none',1500); renderHECAS(); })
                .catch(()=>{});
        }
        function renderHECAS(){
            SMSApp.apiFetch('/api/registrar/hecas')
                .then(r=>r.json())
                .then(students=>{
                    const rows = students.map(s=>{
                        return `<tr><td>${s.givenName} ${s.familyName} (${s.id})</td><td>${s.program||''}</td><td>${s.hecasEligible?'<span class=badge>Eligible</span>':'<span class=badge style=\"background:#4a2545\">Not Eligible</span>'}</td></tr>`;
                    }).join('');
                    document.getElementById('hecasBody').innerHTML = rows || '<tr><td colspan=3>No students</td></tr>';
                });
        }
        renderHECAS();
    </script>
</body>
</html>
