<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student • WPU SMS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="appbar">
        <div class="container row space-between">
            <div class="brand">Student Dashboard</div>
            <div class="row" id="userbar"></div>
        </div>
    </header>
    <main class="container grid" style="grid-template-columns: 1fr 2fr;align-items:start">
        <aside class="card">
            <div class="section-title">Actions</div>
            <div class="grid">
                <button class="btn secondary" onclick="showSection('secProfile')">View Profile</button>
                <button class="btn secondary" onclick="showSection('secTranscript')">View Transcript</button>
                <button class="btn secondary" onclick="showSection('secEnroll')">Enroll/Unenroll Units</button>
                <button class="btn danger" onclick="SMSApp.logout()">Logout</button>
            </div>
        </aside>
        <section class="card">
            <div id="secProfile">
                <div class="section-title">Profile</div>
                <div id="profile"></div>
            </div>
            <div id="secTranscript" class="hidden">
                <div class="section-title">Transcript</div>
                <table>
                    <thead><tr><th>Unit</th><th>Title</th><th>Grade</th></tr></thead>
                    <tbody id="transBody"></tbody>
                </table>
            </div>
            <div id="secEnroll" class="hidden">
                <div class="section-title">Enroll / Unenroll</div>
                <div class="grid">
                    <label>Term<br><input id="term" class="input" value="2025-T1"></label>
                    <label>Unit<br>
                        <select id="unitSelect" class="input"></select>
                    </label>
                    <div class="row">
                        <button class="btn" onclick="enroll()">Enroll</button>
                        <button class="btn danger" onclick="unenroll()">Unenroll</button>
                    </div>
                </div>
                <div style="margin-top:12px">
                    <div class="section-title">Current Enrollments</div>
                    <table>
                        <thead><tr><th>Unit</th><th>Title</th><th>Term</th></tr></thead>
                        <tbody id="enrollBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <script src="assets/js/app.js"></script>
    <script>
        const session = SMSApp.guardRole('student');
        document.getElementById('userbar').innerHTML = `<span class="badge">Logged in: ${session.name}</span>`;
        let unitsCache = [];
        function showSection(id){
            ['secProfile','secTranscript','secEnroll'].forEach(x=>document.getElementById(x).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id==='secTranscript') renderTranscript();
            if(id==='secEnroll') { renderUnitOptions(); renderEnrollments(); }
            if(id==='secProfile') renderProfile();
        }
        function renderProfile(){
            SMSApp.apiFetch('/api/student/profile')
              .then(r=>r.json())
              .then(me=>{ document.getElementById('profile').innerHTML = `${me.givenName} ${me.familyName} (${me.id})<br>Program: ${me.program||''}`; });
        }
        function renderTranscript(){
            SMSApp.apiFetch('/api/student/transcript')
              .then(r=>r.json())
              .then(items=>{
                const rows = items.map(t=>`<tr><td>${t.unitId}</td><td>${t.title||''}</td><td>${t.grade}</td></tr>`).join('');
                document.getElementById('transBody').innerHTML = rows || '<tr><td colspan=3>No records</td></tr>';
              });
        }
        function renderUnitOptions(){
            SMSApp.apiFetch('/api/student/units')
              .then(r=>r.json())
              .then(units=>{ unitsCache = units; document.getElementById('unitSelect').innerHTML = units.map(u=>`<option value="${u.id}">${u.id} — ${u.title}</option>`).join(''); });
        }
        function renderEnrollments(){
            SMSApp.apiFetch('/api/student/enrollments')
              .then(r=>r.json())
              .then(enrolls=>{
                const rows = enrolls.map(e=>{
                  const u = unitsCache.find(x=>x.id===e.unitId);
                  return `<tr><td>${e.unitId}</td><td>${u?u.title:''}</td><td>${e.term}</td></tr>`;
                }).join('');
                document.getElementById('enrollBody').innerHTML = rows || '<tr><td colspan=3>None</td></tr>';
              });
        }
        function enroll(){
            const unitId = document.getElementById('unitSelect').value;
            const term = document.getElementById('term').value.trim();
            SMSApp.apiFetch('/api/student/enroll', { method:'POST', body: JSON.stringify({ unitId, term }) }).then(()=> renderEnrollments());
        }
        function unenroll(){
            const unitId = document.getElementById('unitSelect').value;
            const term = document.getElementById('term').value.trim();
            SMSApp.apiFetch('/api/student/unenroll', { method:'POST', body: JSON.stringify({ unitId, term }) }).then(()=> renderEnrollments());
        }
        showSection('secProfile');
    </script>
</body>
</html>
